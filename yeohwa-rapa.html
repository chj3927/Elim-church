<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여호와라파</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard-dynamic-subset.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
html, body { -webkit-user-select: none; user-select: none; }
input, textarea { -webkit-user-select: text; user-select: text; }
#app { touch-action: pan-y; }
html { font-size: 15px; }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; background:#F5F0E8; min-height:100vh; color:#1A1814; }

/* ── 로딩 ── */
#loading { position:fixed; inset:0; background:linear-gradient(160deg,#C96442,#7D3A24); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
.spin { width:36px; height:36px; border:2.5px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; margin-top:20px; }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes swipeAnim { 0%,100%{transform:translateY(6px);opacity:.4} 50%{transform:translateY(-4px);opacity:1} }

/* ── 헤더 버튼 ── */
.hdr-btn { display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:10px; background:transparent; cursor:pointer; border:none; color:#1A1814; transition:background .15s; }
.hdr-btn:active { background:rgba(26,24,20,.08); }
.hdr-btn svg { width:22px; height:22px; }

/* ── 카드 - Claude 스타일 박스 ── */
.card {
  background:#F5F0E8;
  border:1.5px solid #D9D3C8;
  border-radius:16px;
  padding:16px;
  transition:box-shadow .2s;
}
.card:active { box-shadow:0 0 0 3px rgba(217,119,6,.15); }

/* ── 모달 ── */
.modal { position:fixed; inset:0; background:rgba(28,25,23,.45); z-index:50; display:flex; align-items:flex-end; backdrop-filter:blur(2px); }
.modal-box { background:#F5F0E8; width:100%; max-width:480px; margin:0 auto; border-radius:20px 20px 0 0; max-height:92vh; overflow-y:auto; border-top:1.5px solid #D9D3C8; }
.modal-hdr { position:sticky; top:0; background:#F5F0E8; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1.5px solid #D9D3C8; }

/* ── 입력 ── */
input, textarea, select {
  background:#F5F0E8 !important;
  border:1.5px solid #D9D3C8 !important;
  border-radius:10px;
  color:#1A1814;
}
input:focus, textarea:focus, select:focus {
  outline:none;
  border-color:#1A1814 !important;
  box-shadow:0 0 0 3px rgba(217,119,6,.12);
}

/* ── 마퀴 ── */
.marquee-wrap { overflow:hidden; white-space:nowrap; width:100%; background:#F5F0E8; border-bottom:1.5px solid #D9D3C8; }
.marquee-inner { display:inline-block; animation:marquee 12s linear infinite; }
.marquee-inner:hover { animation-play-state:paused; }
@keyframes marquee { 0% { transform:translateX(100%); } 100% { transform:translateX(-100%); } }

/* ── 기타 ── */
.kakao-btn { background:#FEE500; color:#3A1D1D; }
.photo-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; border-radius:10px; padding:8px 12px; font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid #D9D3C8; background:#F5F0E8; }
.av-opt { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; background:#EDE8E0; transition:.15s; }
.av-opt.sel { background:#E4D5C3; box-shadow:0 0 0 2px #C96442; }
.bg-white { background:#F5F0E8 !important; }
/* ── 닫기 버튼 ── */
.close-btn { width:32px; height:32px; border-radius:50%; background:#1A1814; color:#F5F0E8; border:none; cursor:pointer; font-size:18px; font-weight:700; display:flex; align-items:center; justify-content:center; line-height:1; flex-shrink:0; }
.close-btn:active { background:#C96442; }

  /* BEST badge chip */
  .best-chip{display:inline-block;margin-left:6px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:900;letter-spacing:0.6px;line-height:1;background:#111827;color:#F5F0E8;border:1px solid rgba(255,255,255,0.15);vertical-align:middle;}

/* === UI Consistency (폼 컨트롤 크기/서체 통일) === */
.modal-box input[type="text"],
.modal-box input[type="date"],
.modal-box input[type="time"],
.modal-box select,
.modal-box textarea {
  font-size:14px !important;
  font-weight:500 !important;
  line-height:1.25 !important;
  padding:10px 14px !important;
  border-radius:11px !important;
  box-sizing:border-box !important;
}
.modal-box select {
  min-height:42px !important;
}
.modal-box textarea {
  min-height:92px !important;
}




/* === Minimal Icon Buttons (delete/save etc.) === */
.mini-icon-row{display:flex;gap:10px;margin-bottom:8px;align-items:center;justify-content:space-between;width:100%}
.mini-icon-btn{
  width:48px;height:48px;flex:0 0 48px;
  display:flex;align-items:center;justify-content:center;
  padding:0;
  background:transparent;
  border:none;
  border-radius:14px;
  cursor:pointer;
  transition:background .15s ease, transform .08s ease;
}

/* overlapped trash icon */
.trash-overlap{position:relative;width:22px;height:22px;display:inline-block}
.trash-overlap svg{position:absolute;top:2px;left:2px;width:18px;height:18px}
.trash-overlap svg:nth-child(2){transform:translate(5px,-5px);opacity:.95}
.mini-icon-btn:active{transform:scale(0.97)}
.mini-icon-btn.danger{color:#DC2626}
.mini-icon-btn.danger:active{background:rgba(220,38,38,0.10)}
.mini-icon-btn.primary{background:#1A1814;color:#F5F0E8}
.mini-icon-btn.primary:active{background:#0F0E0C}

</style>
</head>

<!-- Google 로그인 (Firebase Auth 팝업 방식) -->
<style>
#auth-overlay{position:fixed;inset:0;z-index:99999;background:linear-gradient(160deg,#C96442,#7D3A24);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#auth-overlay.hidden{display:none;}
.auth-logo{width:64px;height:64px;margin-bottom:14px;border-radius:14px;object-fit:contain;}
.auth-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;letter-spacing:-0.02em;}
.auth-sub{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:28px;text-align:center;line-height:1.7;}
.auth-card{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:320px;text-align:center;}
.auth-card h3{font-size:15px;font-weight:800;color:#1A1814;margin-bottom:6px;}
.auth-card p{font-size:13px;color:#6B7280;margin-bottom:20px;line-height:1.6;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:1.5px solid #D9D3C8;border-radius:10px;background:#fff;font-size:14px;font-weight:700;color:#1A1814;cursor:pointer;transition:all .2s;}
.google-btn:active{background:#F5F5F5;}
.google-btn img{width:20px;height:20px;}
.auth-pending{background:#FEF3C7;border-radius:12px;padding:18px;text-align:center;}
.auth-input{padding:10px 14px;border:1.5px solid #D9D3C8;border-radius:10px;font-size:14px;outline:none;width:100%;box-sizing:border-box;margin-bottom:8px;}
.auth-btn{padding:12px;border-radius:10px;border:none;background:#C96442;color:#fff;font-size:14px;font-weight:800;cursor:pointer;width:100%;}
.auth-signout{margin-top:10px;font-size:12px;color:#9CA3AF;cursor:pointer;text-decoration:underline;display:block;}
</style>

  <div class="auth-sub">여호와라파 셀<br>구글 계정으로 로그인하세요</div>
  <div class="auth-card" id="auth-card">
    <h3>로그인</h3>
    <p>담당자 승인 후 사용 가능합니다</p>
    <button class="google-btn" onclick="window.googleLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
      Google로 로그인
    </button>
  </div>
</div>

<script type="module">
  import {initializeApp, getApps} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {getFirestore, doc, setDoc, getDoc, onSnapshot} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDBmyfa8prUExn3IAA0vaPv844K8oZfvmE",
    authDomain: "elim-church-2072d.firebaseapp.com",
    projectId: "elim-church-2072d",
    storageBucket: "elim-church-2072d.firebasestorage.app",
    messagingSenderId: "345257256943",
    appId: "1:345257256943:web:27ebb7bbf67f15eadaf81a"
  };

  const appName = 'auth_여호와라파';
  const fbApp = getApps().find(a=>a.name===appName) || initializeApp(firebaseConfig, appName);
  const auth = getAuth(fbApp);
  const db = getFirestore(fbApp);
  const provider = new GoogleAuthProvider();

  // 로그인 상태 확인
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      await checkUser(user);
    }
  });

  window.googleLogin = async function() {
    try {
      const result = await signInWithPopup(auth, provider);
      await checkUser(result.user);
    } catch(e) {
      console.log('로그인 오류:', e.message);
      if(e.code !== 'auth/popup-closed-by-user') {
        alert('로그인 오류: ' + e.message);
      }
    }
  };

  async function checkUser(user) {
    const uid = user.uid;
    const email = user.email;
    const name = user.displayName;
    const photo = user.photoURL;

    const userRef = doc(db, 'users', uid);
    const userSnap = await getDoc(userRef);

    // 관리자 이메일 자동 진입
    const ADMIN_EMAILS = ['chj3927@gmail.com'];
    if (ADMIN_EMAILS.includes(email)) {
      enterApp({name, email, role:'admin', approved:true});
      return;
    }

    if (userSnap.exists()) {
      const userData = userSnap.data();
      if (userData.approved || userData.role === 'admin') {
        enterApp(userData);
        onSnapshot(userRef, (snap) => {
          if(snap.exists() && !snap.data().approved && snap.data().role !== 'admin') location.reload();
        });
      } else {
        showPending(name, email);
        onSnapshot(userRef, (snap) => {
          if(snap.exists() && (snap.data().approved || snap.data().role === 'admin')) enterApp(snap.data());
        });
      }
    } else {
      showRegister(name, email, uid, photo);
    }
  }

  function showRegister(name, email, uid, photo) {
    document.getElementById('auth-card').innerHTML = `
      <h3>추가 정보 입력</h3>
      <p>처음 방문하셨군요!<br>이름과 소속을 확인해 주세요.</p>
      <input class="auth-input" id="reg-name" placeholder="이름" value="${name||''}">
      <input class="auth-input" id="reg-cell" placeholder="소속 셀" value="여호와라파">
      <button class="auth-btn" onclick="window._submitReg('${uid}','${email}','${encodeURIComponent(photo||'')}')">가입 신청</button>
    `;
  }

  window._submitReg = async function(uid, email, photoEnc) {
    const name = document.getElementById('reg-name').value.trim();
    const cell = document.getElementById('reg-cell').value.trim();
    if(!name||!cell) { alert('이름과 소속을 입력해 주세요.'); return; }
    const photo = decodeURIComponent(photoEnc);
    await setDoc(doc(db,'users',uid), {
      email, name, cell, photo,
      approved: false, role: 'leader',
      createdAt: new Date().toISOString()
    });
    showPending(name, email);
    onSnapshot(doc(db,'users',uid), (snap) => {
      if(snap.exists() && snap.data().approved) enterApp(snap.data());
    });
  };

  function showPending(name, email) {
    document.getElementById('auth-card').innerHTML = `
      <div class="auth-pending">
        <div style="font-size:36px;margin-bottom:8px">⏳</div>
        <h3 style="color:#92400E;margin-bottom:6px">승인 대기중</h3>
        <p style="color:#B45309;font-size:13px">${name}님<br>${email}<br><br>관리자 승인 후<br>자동으로 입장됩니다</p>
      </div>
      <span class="auth-signout" onclick="window._fbSignOut()">다른 계정으로 로그인</span>
    `;
  }

  function enterApp(userData) {
    document.getElementById('auth-overlay').classList.add('hidden');
    window._currentUser = userData;
    if(typeof render === 'function') render();
  }

  window._fbSignOut = async function() {
    await auth.signOut();
    location.reload();
  };
</script>

// ═══════════════════════════════════
//  STATE
// ═══════════════════════════════════
let groups  = JSON.parse(localStorage.getItem('elim_엘림교회_여호와라파_Groups'))  || [];
let members = JSON.parse(localStorage.getItem('elim_엘림교회_여호와라파_Members')) || [];

// 첫 번째 그룹은 항상 헤더명, 두 번째는 항상 BEST
const APP_TITLE = '여호와라파';
const BEST_GROUP = 'BEST_여호와라파';

// 그룹 표시용(저장값은 유지, 화면표시만 변경)
function dispGroup(g){
  if(g===BEST_GROUP) return APP_TITLE+' BEST';
  if(g===APP_TITLE) return APP_TITLE;
  return g;
}

// 그룹 표시(HTML)용: BEST는 작은 칩으로
function dispGroupHTML(g){
  if(g===BEST_GROUP) return APP_TITLE+' <span class="best-chip">BEST</span>';
  if(g===APP_TITLE) return APP_TITLE;
  return g;
}

// groups[0] = APP_TITLE 보장
if(!groups[0] || groups[0] !== APP_TITLE) {
  const old = groups[0];
  groups[0] = APP_TITLE;
  if(old && old !== APP_TITLE) members = members.map(m=>m.group===old?{...m,group:APP_TITLE}:m);
}
// BEST_GROUP 은 position 1 에 딱 하나만
groups = groups.filter(g => g !== BEST_GROUP);
groups.splice(1, 0, BEST_GROUP);
// 전체 groups 중복 제거 (순서 유지)
groups = groups.filter((g, i) => groups.indexOf(g) === i);

let view   = 'list';   // 'list' | 'detail'
let homeTab = 'members'; // 'members' | 'schedule' | 'meeting'
let selGrp = APP_TITLE;
let selMem = null;
let tab    = 'info';   // info | counseling | education | attendance
let q      = '';       // search query
let attDate = today();
// 출석 기간 필터
let attRangeFrom = (()=>{ const d=new Date(); d.setDate(1); return d.toISOString().slice(0,10); })(); // 이번달 1일
let attRangeTo   = today();
let attRangePreset = 'month'; // 'month'|'3month'|'6month'|'year'|'all'|'custom'
let attModalTab  = 'check'; // 'check'|'stats'
let attStatsOpen = false; // 기간통계 펼침/접힘

// 날짜 자동 업데이트: 탭 복귀 / 포커스 / 1분마다
function checkAndUpdateDate() {
  const t = today();
  if(t !== attDate) {
    attDate = t;
    render();
  }
}
setInterval(checkAndUpdateDate, 60000);
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) checkAndUpdateDate(); });
window.addEventListener('focus', checkAndUpdateDate);
window.addEventListener('pageshow', checkAndUpdateDate);

// modal flags
let mAddMem=false, mEditMem=false, mAttendance=false, mGroupMgr=false;
let mAddCns=false,  mEditCns=false, mAddEdu=false, mEditEdu=false;
let mAddAtt=false,  mRename=false,  mBulkSMS=false, mBulkKakao=false;

function _attRange(preset) {
  const now = new Date();
  const to = now.toISOString().slice(0,10);
  let from;
  if(preset==='month') {
    from = to.slice(0,7)+'-01';
  } else if(preset==='3month') {
    const d=new Date(now); d.setMonth(d.getMonth()-3); from=d.toISOString().slice(0,10);
  } else if(preset==='6month') {
    const d=new Date(now); d.setMonth(d.getMonth()-6); from=d.toISOString().slice(0,10);
  } else if(preset==='year') {
    from = to.slice(0,4)+'-01-01';
  } else {
    from = '2000-01-01';
  }
  return {from, to};
}
function setAttPreset(p) {
  attRangePreset = p;
  if(p !== 'custom') {
    const r = _attRange(p);
    attRangeFrom = r.from;
    attRangeTo   = r.to;
  }
  render();
}
function today() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}

function attLabel(dateStr) {
  const dow = new Date(dateStr).getDay();
  return WORSHIP_MAP[dow] ? WORSHIP_MAP[dow].label : null;
}
function attColor(dateStr) {
  const dow = new Date(dateStr).getDay();
  return WORSHIP_MAP[dow] ? WORSHIP_MAP[dow].color : '#6B7280';
}
function getWorshipDates(count=8) {
  // 오늘 기준 최근/앞으로 예배일 목록
  const worshipDows = [0,3,5,6];
  const dates = [];
  const ref = new Date(); ref.setHours(0,0,0,0);
  // 과거 포함 ±30일
  for(let i=-30; i<=30; i++) {
    const d = new Date(ref); d.setDate(d.getDate()+i);
    if(worshipDows.includes(d.getDay())) {
      dates.push(localDateStr(d));
    }
  }
  // 오늘 포함, 과거순 정렬, 최근 count개
  return dates.sort((a,b)=>b.localeCompare(a)).slice(0,count);
}

function getAtt(mid) {
  const m=members.find(x=>x.id===mid);
  return m?.attendance?.find(a=>a.date===attDate)||{status:'none',reason:''};
}
function updateReason(mid, reason) {
  members=members.map(m=>{
    if(m.id!==mid) return m;
    const att=[...(m.attendance||[])];
    const idx=att.findIndex(a=>a.date===attDate);
    if(idx>=0) att[idx]={...att[idx],reason};
    return {...m,attendance:att};
  });
  save();
}
function markAtt(mid, status) {
  // 결석 클릭 시 같은 그룹의 미체크 인원 자동 출석 처리
  if(status === 'absent') {
    const grpMembers = members.filter(m => (selGrp==='all' || m.group === members.find(x=>x.id===mid)?.group));
    members = members.map(m => {
      const isTarget = m.id === mid;
      const att = [...(m.attendance||[])];
      const idx = att.findIndex(a=>a.date===attDate);
      const existing = idx>=0 ? att[idx] : null;
      // 대상: 결석으로, 미체크인 동그룹원: 출석으로
      const newStatus = isTarget ? 'absent' : (existing ? existing.status : 'present');
      const rec = {date:attDate, status:newStatus, reason: isTarget ? '' : (existing?.reason||'')};
      if(isTarget || (!existing && grpMembers.find(gm=>gm.id===m.id))) {
        if(idx>=0) att[idx]=rec; else att.push(rec);
      }
      return {...m, attendance:att};
    });
  } else {
    members = members.map(m => {
      if(m.id!==mid) return m;
      const att=[...(m.attendance||[])];
      const idx=att.findIndex(a=>a.date===attDate);
      const rec={date:attDate,status,reason:''};
      if(idx>=0) att[idx]=rec; else att.push(rec);
      return {...m,attendance:att};
    });
  }
  save(); window._keepScroll=true; render();
}
function addAttRec() {
  if(!newAttRec.date){ alert('날짜를 선택하세요'); return; }
  members=members.map(m=>{
    if(m.id!==selMem.id) return m;
    const att=[...(m.attendance||[])];
    const idx=att.findIndex(a=>a.date===newAttRec.date);
    if(idx>=0) att[idx]={...newAttRec}; else att.push({...newAttRec});
    return {...m,attendance:att};
  });
  save(); selMem=members.find(m=>m.id===selMem.id);
  const wasEditing = newAttRec.editing||false;
  newAttRec={date:today(),status:'present',reason:''};
  mAddAtt=false; if(!wasEditing) alert('출석 기록이 추가되었습니다!'); window._keepScroll=true; render();
}

function openRename(g){ renaming=g; renameVal=g; mRename=true; render(); }
function confirmRename() {
  const n=renameVal.trim();
  if(!n){ alert('이름을 입력하세요'); return; }
  if(n===renaming){ mRename=false; render(); return; }
  if(groups.includes(n)){ alert('이미 존재합니다'); return; }
  if(renaming===APP_TITLE){ alert('"'+APP_TITLE+'" 그룹은 변경할 수 없습니다'); return; }
  if(renaming===BEST_GROUP){ alert('"BEST" 그룹은 변경할 수 없습니다'); return; }
  groups=groups.map(g=>g===renaming?n:g);
  members=members.map(m=>m.group===renaming?{...m,group:n}:m);
  if(selGrp===renaming) selGrp=n;
  save(); mRename=false; renaming=''; renameVal=''; alert('변경되었습니다!'); render();
}
function delGroup(g) {
  if(!confirm('"'+g+'" 그룹을 삭제하시겠습니까?')) return;
  groups=groups.filter(x=>x!==g); save();
  if(selGrp===g) selGrp='all'; render();
}
function changeGrp(mid, g) {
  members=members.map(m=>m.id===mid?{...m,group:g}:m); save();
  if(selMem&&selMem.id===mid) selMem=members.find(m=>m.id===mid);
  render();
}

function call(phone){ if(!phone){ alert('번호 없음'); return; } window.location.href='tel:'+phone; }
function sms(phone) {
  if(!phone){ alert('번호 없음'); return; }
  const msg=prompt('보낼 메시지:');
  if(msg) window.location.href='sms:'+phone+'?body='+encodeURIComponent(msg);
}
function kakao(phone, kakaoId) {
  // 카카오 ID가 있으면 ID로 바로 연결
  if(kakaoId && kakaoId.trim()) {
    window.location.href='kakaotalk://open/id/'+encodeURIComponent(kakaoId.trim());
    return;
  }
  // 없으면 전화번호로 시도
  if(!phone){ alert('카카오ID 또는 번호가 없습니다'); return; }
  const digits=phone.replace(/[^0-9]/g,'');
  const intl=digits.startsWith('0')?'+82'+digits.slice(1):'+'+digits;
  const iframe=document.createElement('iframe');
  iframe.style.display='none'; document.body.appendChild(iframe);
  let opened=false;
  const t=setTimeout(()=>{
    if(!opened){
      document.body.contains(iframe)&&document.body.removeChild(iframe);
      if(navigator.clipboard){
        navigator.clipboard.writeText(phone).then(()=>alert('📋 번호 복사됨!\n'+phone+'\n\n카카오톡 친구검색에 붙여넣기 하세요.'));
      } else { prompt('카카오톡 친구검색:', phone); }
    }
  },1500);
  window.addEventListener('blur',()=>{ opened=true; clearTimeout(t); document.body.contains(iframe)&&document.body.removeChild(iframe); },{once:true});
  iframe.src='kakaotalk://profile?phoneNumber='+encodeURIComponent(intl);
}

function sendAbsentSMS() {
  const absentList = members.filter(m=>{

    return a && a.status==='absent' && m.phone;
  });

  window.location.href='sms:'+absentList.map(m=>m.phone).join(',')+'?body='+encodeURIComponent(bulkMsg);

  const sel=members.filter(m=>kakaoSel[m.id]&&m.phone);

  if(!kakaoMsg.trim()){ alert('메시지를 입력하세요'); return; }
  // 첫 번째 수신자를 카카오톡으로 열고, 메시지를 클립보드에 복사
  const phones = sel.map(m=>m.phone);
  const msg = kakaoMsg;
  if(navigator.clipboard) {
    navigator.clipboard.writeText(msg).then(()=>{
      alert('✅ 메시지가 복사되었습니다!\n\n수신자('+sel.length+'명):\n'+sel.map(m=>m.name).join(', ')+'\n\n카카오톡에 붙여넣기 하세요.');

    prompt('메시지를 복사하세요:', msg);

  const intl = first.startsWith('0') ? '+82'+first.slice(1) : '+'+first;
  setTimeout(()=>{ window.location.href='kakaotalk://profile?phoneNumber='+encodeURIComponent(intl); }, 500);

function normalizeMeetings(){
  try{
    const arr=(meetings||[]).slice().sort(function(a,b){return (b.id||0)-(a.id||0);});
    const seen=new Set();
    const out=[];
    arr.forEach(function(m){
      if(m && m.scheduleId){
        if(seen.has(m.scheduleId)) return;
        seen.add(m.scheduleId);
      }
      out.push(m);
    });
    meetings=out;
  }catch(e){}
}

// 매월 N번째 특정 요일 → 날짜 계산 (week:-1=마지막)
function localDateStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getNthWeekday(year,month,week,day){
  // day: 0=일,1=월,...,6=토 / week: 1~4=첫째~넷째, -1=마지막
  if(week===-1){
    var last=new Date(year,month+1,0); // 월 말일
    var diff=(last.getDay()-day+7)%7;
    return new Date(year,month,last.getDate()-diff);
  }
  var first=new Date(year,month,1);
  var diff2=(day-first.getDay()+7)%7;
  return new Date(year,month,1+diff2+(week-1)*7);
}
function addDays(dt,n){var d=new Date(dt+'T00:00');d.setDate(d.getDate()+n);return localDateStr(d);}
function addMonths(dt,n){var d=new Date(dt+'T00:00');d.setMonth(d.getMonth()+n);return localDateStr(d);}

function addSched() {
  const s=newSched;
  if(!s.title||!s.date){alert('날짜와 제목을 입력하세요');return;}
  const rgId=s.repeat!=='none'?Date.now()+Math.random():null;
  schedules.push({...s,id:Date.now(),repeatGroupId:rgId});
  // repeatCount 방식: N회 반복
  if(s.repeat!=='none'&&(s.repeatCount||4)>1){
    const totalExtra=(s.repeatCount||4)-1;
    const startD=new Date(s.date+'T00:00');
    let mOff=0;
    for(let si=0;si<totalExtra&&si<104;si++){
      let nd;
      if(s.repeat==='weekly'){
        nd=addDays(s.date,(s.weekInterval||1)*7*(si+1));
      } else if(s.repeat==='biweekly'){
        nd=addDays(s.date,14*(si+1));
      } else if(s.repeat==='monthly'){
        mOff+=(s.nthInterval||1);
        if(s.monthlyMode==='nth'){
          const yr=startD.getFullYear()+Math.floor((startD.getMonth()+mOff)/12);
          const mo=(startD.getMonth()+mOff)%12;
          const ref=getNthWeekday(yr,mo,s.refWeek||1,s.refDay||0);
          const off=new Date(ref); off.setDate(ref.getDate()+(s.dayOffset||0));
          nd=localDateStr(off);
        } else {
          nd=addMonths(s.date,mOff);
        }
      }
      schedules.push({...s,id:Date.now()+si+1,date:nd,repeatGroupId:rgId});
    }
  }
  save(); mAddSched=false; newSched=blankSched(); render();
}

function openEditSched(id) {
  editSched={...schedules.find(s=>s.id===id)};
  mEditSched=true; mAddSched=false; render();
}
function calcSeriesDates(s, cnt) {
  // s: 설정 객체, cnt: 총 회수. 첫번째 날짜는 s.date 기준으로 해당 월/주 재계산
  const startD = new Date(s.date+'T00:00');
  const dates = [];
  let mOff = 0;
  for(let i=0;i<cnt;i++){
    let nd;
    if(i===0){
      if(s.repeat==='monthly'&&s.monthlyMode==='nth'){
        const r0=getNthWeekday(startD.getFullYear(),startD.getMonth(),s.refWeek||1,s.refDay||0);
        const o0=new Date(r0); o0.setDate(r0.getDate()+(s.dayOffset||0)); nd=localDateStr(o0);
      } else { nd=localDateStr(startD); }
    } else {
      if(s.repeat==='weekly'){ nd=addDays(dates[0],(s.weekInterval||1)*7*i); }
      else if(s.repeat==='biweekly'){ nd=addDays(dates[0],14*i); }
      else if(s.repeat==='monthly'){
        mOff+=(s.nthInterval||1);
        const yr=startD.getFullYear()+Math.floor((startD.getMonth()+mOff)/12);
        const mo=(startD.getMonth()+mOff)%12;
        if(s.monthlyMode==='nth'){
          const r=getNthWeekday(yr,mo,s.refWeek||1,s.refDay||0);
          const o=new Date(r); o.setDate(r.getDate()+(s.dayOffset||0)); nd=localDateStr(o);
        } else { nd=addMonths(dates[0],mOff); }
      }
    }
    dates.push(nd);
  }
  return dates;
}
function updateSched() {
  if(!editSched.title||!editSched.date){alert('날짜와 제목을 입력하세요');return;}
  if(editSched.repeatGroupId){
    const gId=editSched.repeatGroupId;
    const grp=schedules.filter(x=>x.repeatGroupId===gId).sort((a,b)=>a.date<b.date?-1:1);
    const cnt=grp.length;
    // 날짜 재계산 (editSched.date 기준 월/주 적용)
    const newDates=calcSeriesDates(editSched,cnt);
    // 각 항목 업데이트
    grp.forEach(function(gs,i){
      schedules=schedules.map(function(sc){
        return sc.id===gs.id
          ? Object.assign({},sc,editSched,{id:gs.id,date:newDates[i]})
          : sc;
      });
    });
  } else {
    schedules=schedules.map(s=>s.id===editSched.id?{...editSched}:s);
  }
  save(); mEditSched=false; render();
}
function delSched(id,mode) {
  const s=schedules.find(x=>x.id===id);
  if(!s) return;
  mEditSched=false; mAddSched=false;
  if(s.repeatGroupId&&mode==='all'){
    if(!confirm('반복 일정 전체를 삭제하시겠습니까?'))return;
    schedules=schedules.filter(x=>x.repeatGroupId!==s.repeatGroupId);
  } else if(s.repeatGroupId&&mode==='this'){
    if(!confirm('이 일정만 삭제하시겠습니까?'))return;
    schedules=schedules.filter(x=>x.id!==id);
  } else {
    if(!confirm('이 일정을 삭제하시겠습니까?'))return;
    schedules=schedules.filter(x=>x.id!==id);
  }
  save(); mEditSched=false; render();
}
function addMeet() {
  if(meetSaving) return;
  meetSaving=true;
  const m=newMeet;
  if(!m.date){alert('날짜를 선택하세요');meetSaving=false;return;}

  // 1) 강제 중복 방지: 연동 일정(scheduleId)이 같으면 1개만 허용
  if(m.scheduleId){
    const ex=meetings.find(x=>x.scheduleId===m.scheduleId);
    if(ex){
      alert('이미 이 일정으로 모임 기록이 있습니다. 기존 기록을 엽니다.');
      mAddMeet=false; mEditMeet=false; mViewMeet=false;
      meetSaving=false;
      openEditMeet(ex.id);
      return;
    }
  }

  // 2) 소프트 중복 경고(수동 입력용): 같은 날짜/시간/제목/장소가 있으면 확인
  const sig=(m.date||'')+'|'+(m.time||'')+'|'+(m.topic||'')+'|'+(m.place||'');
  const dup=meetings.find(x=>!x.scheduleId && ((x.date||'')+'|'+(x.time||'')+'|'+(x.topic||'')+'|'+(x.place||''))===sig);
  if(dup){
    const ok=confirm('같은 내용의 모임 기록이 이미 있습니다. 그래도 추가할까요?');
    if(!ok){ meetSaving=false; return; }
  }

  meetings.push({...m,id:Date.now()});
  save(); mAddMeet=false; meetSaving=false; render();
}

// JSON 가져오기 (다른 앱 백업파일 병합)
function importJSON(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if(!data.members || !Array.isArray(data.members)) {
        alert('❌ 올바른 백업 파일이 아닙니다'); return;
      }
      // 그룹 병합 (없는 그룹만 추가)
      let addedGroups = 0;
      (data.groups||[]).forEach(g => {
        if(g && !groups.includes(g)) { groups.push(g); addedGroups++; }
      });
      // 멤버 병합 (이름+전화번호 기준 중복 체크)
      let addedMembers = 0, skipped = 0;
      data.members.forEach(m => {
        const dup = members.find(x => x.name === m.name && x.phone === m.phone);
        if(dup) { skipped++; return; }
        const newMem = {...m, id: Date.now() + Math.random()};
        members.push(newMem);
        addedMembers++;
      });
      save();
      render();
      input.value = '';
      alert(`✅ 가져오기 완료!\n셀원 ${addedMembers}명 추가\n그룹 ${addedGroups}개 추가\n중복 ${skipped}명 건너뜀`);
    } catch(err) {
      alert('❌ 파일을 읽을 수 없습니다: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// 탭 닫을 때 자동 백업 (7일에 한 번)
window.addEventListener('beforeunload', function() {
  if(!members.length) return;
  const lastAuto = localStorage.getItem('elimAutoBackup_여호와라파');
  const now = Date.now();
  const sevenDays = 7 * 24 * 60 * 60 * 1000;
  if(lastAuto && (now - parseInt(lastAuto)) < sevenDays) return; // 7일 안 됐으면 스킵
  try {
    const data={members,groups,backupDate:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='ElimCell_자동백업_'+today()+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    localStorage.setItem('elimAutoBackup_여호와라파', String(now));
  } catch(e){}
});

function addPrayer() {
  if(!newPrayer.trim()){alert('기도 내용을 입력하세요'); return;}
  members=members.map(m=>m.id===selMem.id?{...m,prayers:[...(m.prayers||[]),{id:Date.now(),date:today(),content:newPrayer,answered:false}]}:m);
  selMem=members.find(m=>m.id===selMem.id); save(); newPrayer=''; render();
}
function toggleAnswered(pid) {
  members=members.map(m=>m.id===selMem.id?{...m,prayers:(m.prayers||[]).map(p=>p.id===pid?{...p,answered:!p.answered}:p)}:m);
  selMem=members.find(m=>m.id===selMem.id); save(); render();
}
function delPrayer(pid) {
  members=members.map(m=>m.id===selMem.id?{...m,prayers:(m.prayers||[]).filter(p=>p.id!==pid)}:m);
  selMem=members.find(m=>m.id===selMem.id); save(); render();
}

// ═══════════════════════════════════
//  SWIPE TO ENTER
// ═══════════════════════════════════
(function(){
  const loading = document.getElementById('loading');
  const fill = document.getElementById('swipe-fill');
  let startY = null, startX = null;
  const THRESHOLD = 80; // px 위로 스와이프

  function enter() {
    loading.style.transition = 'transform .45s cubic-bezier(.4,0,.2,1), opacity .45s';
    loading.style.transform = 'translateY(-100%)';
    loading.style.opacity = '0';
    setTimeout(()=>{ loading.style.display='none'; render(); }, 450);
  }

  loading.addEventListener('touchstart', e=>{
    startY = e.touches[0].clientY;
    startX = e.touches[0].clientX;
    if(fill) fill.style.transition = 'none';
  }, {passive:true});

  loading.addEventListener('touchmove', e=>{
    if(startY===null) return;
    const dy = startY - e.touches[0].clientY;
    if(dy < 0) { if(fill) fill.style.width='0%'; return; }
    const pct = Math.min(dy / THRESHOLD * 100, 100);
    if(fill) fill.style.width = pct+'%';
    loading.style.transform = 'translateY(-'+Math.min(dy*0.4, 40)+'px)';
  }, {passive:true});

  loading.addEventListener('touchend', e=>{
    if(startY===null) return;
    const dy = startY - e.changedTouches[0].clientY;
    startY = null;
    if(dy >= THRESHOLD) {
      enter();
    } else {
      loading.style.transition = 'transform .3s ease';
      loading.style.transform = 'translateY(0)';
      if(fill) { fill.style.transition = 'width .3s'; fill.style.width='0%'; }
    }
  }, {passive:true});

  // 클릭/탭으로도 진입 가능
  loading.addEventListener('click', ()=>{ enter(); });
})();

// ═══════════════════════════════════
//  SWIPE ← → 그룹/탭 전환
// ═══════════════════════════════════
(function(){
  let sx = 0, sy = 0;

  function anim(dir, fn) {
    fn();
    window.scrollTo({top: 0, behavior: 'instant'});
  }

  function switchGroup(dir) {
    const list = ['all', ...groups];
    let next = list.indexOf(selGrp) + dir;
    if(next < 0) next = list.length - 1;
    if(next >= list.length) next = 0;
    selGrp = list[next]; q = '';
    anim(dir, render);
  }

  function switchTab(dir) {
    const TABS = ['info','counseling','education','attendance','prayer'];
    let next = TABS.indexOf(tab) + dir;
    if(next < 0) next = TABS.length - 1;
    if(next >= TABS.length) next = 0;
    tab = TABS[next];
    anim(dir, render);
  }

  document.addEventListener('touchstart', e=>{
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, {passive:true});

  document.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dx) < 35 || Math.abs(dy) > Math.abs(dx)) return;
    if(document.querySelector('.modal')) return;
    const dir = dx < 0 ? 1 : -1;
    if(view === 'list') switchGroup(dir);
    else if(view === 'detail') switchTab(dir);
  }, {passive:true});
})();
