<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard-dynamic-subset.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
html, body { -webkit-user-select: none; user-select: none; }
input, textarea { -webkit-user-select: text; user-select: text; }
#app { touch-action: pan-x pan-y; }
html { font-size: 15px; }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; background:#F5F0E8; min-height:100vh; color:#1A1814; }

/* ── 로딩 ── */
#loading { position:fixed; inset:0; background:linear-gradient(160deg,#C96442,#7D3A24); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
.spin { width:36px; height:36px; border:2.5px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; margin-top:20px; }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes swipeAnim { 0%,100%{transform:translateY(6px);opacity:.4} 50%{transform:translateY(-4px);opacity:1} }

/* ── 헤더 버튼 ── */
.hdr-btn { display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:10px; background:transparent; cursor:pointer; border:none; color:#1A1814; transition:background .15s; }
.hdr-btn:active { background:rgba(26,24,20,.08); }
.hdr-btn svg { width:22px; height:22px; }

/* ── 카드 - Claude 스타일 박스 ── */
.card {
  background:#F5F0E8;
  border:1.5px solid #D9D3C8;
  border-radius:16px;
  padding:16px;
  transition:box-shadow .2s;
}
.card:active { box-shadow:0 0 0 3px rgba(217,119,6,.15); }

/* ── 모달 ── */
.modal { position:fixed; inset:0; background:rgba(28,25,23,.45); z-index:50; display:flex; align-items:flex-end; backdrop-filter:blur(2px); }
.modal-box { background:#F5F0E8; width:100%; max-width:480px; margin:0 auto; border-radius:20px 20px 0 0; max-height:92vh; overflow-y:auto; border-top:1.5px solid #D9D3C8; 
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  touch-action: pan-y;
}
.modal-hdr { position:sticky; top:0; background:#F5F0E8; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1.5px solid #D9D3C8; }

/* ── 입력 ── */
input, textarea, select {
  background:#F5F0E8 !important;
  border:1.5px solid #D9D3C8 !important;
  border-radius:10px;
  color:#1A1814;
}
input:focus, textarea:focus, select:focus {
  outline:none;
  border-color:#1A1814 !important;
  box-shadow:0 0 0 3px rgba(217,119,6,.12);
}

/* ── 마퀴 ── */
.marquee-wrap { overflow:hidden; white-space:nowrap; width:100%; background:#F5F0E8; border-bottom:1.5px solid #D9D3C8; }
.marquee-inner { display:inline-block; animation:marquee 12s linear infinite; }
.marquee-inner:hover { animation-play-state:paused; }
@keyframes marquee { 0% { transform:translateX(100%); } 100% { transform:translateX(-100%); } }

/* ── 기타 ── */
.kakao-btn { background:#FEE500; color:#3A1D1D; }
.photo-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; border-radius:10px; padding:8px 12px; font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid #D9D3C8; background:#F5F0E8; }
.av-opt { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; background:#EDE8E0; transition:.15s; }
.av-opt.sel { background:#E4D5C3; box-shadow:0 0 0 2px #C96442; }
.bg-white { background:#F5F0E8 !important; }
/* ── 닫기 버튼 ── */
.close-btn { width:32px; height:32px; border-radius:50%; background:#1A1814; color:#F5F0E8; border:none; cursor:pointer; font-size:18px; font-weight:700; display:flex; align-items:center; justify-content:center; line-height:1; flex-shrink:0; }
.close-btn:active { background:#C96442; }

  /* BEST badge chip */
  .best-chip{display:inline-block;margin-left:6px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:900;letter-spacing:0.6px;line-height:1;background:#111827;color:#F5F0E8;border:1px solid rgba(255,255,255,0.15);vertical-align:middle;}

/* === UI Consistency (폼 컨트롤 크기/서체 통일) === */
.modal-box input[type="text"],
.modal-box input[type="date"],
.modal-box input[type="time"],
.modal-box select,
.modal-box textarea {
  font-size:14px !important;
  font-weight:500 !important;
  line-height:1.25 !important;
  padding:10px 14px !important;
  border-radius:11px !important;
  box-sizing:border-box !important;
}
.modal-box select {
  min-height:42px !important;
}
.modal-box textarea {
  min-height:92px !important;
}

.mini-icon-row{display:flex;gap:10px;margin-bottom:8px;align-items:center;justify-content:space-between;width:100%}

  display:flex;align-items:center;justify-content:center;

/* overlapped trash icon */
.trash-overlap{position:relative;width:22px;height:22px;display:inline-block}

.mini-icon-btn.primary{background:#1A1814;color:#F5F0E8}
.mini-icon-btn.primary:active{background:#0F0E0C}


/* (v57-fix) header tap safety */
header{z-index:9999; pointer-events:auto; transform:translateZ(0);}
.hdr-btn{pointer-events:auto;}

</style>

<script type="module">
  import {initializeApp, getApps} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {getFirestore, doc, setDoc, getDoc, onSnapshot} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDBmyfa8prUExn3IAA0vaPv844K8oZfvmE",
    authDomain: "elim-church-2072d.firebaseapp.com",
    projectId: "elim-church-2072d",
    storageBucket: "elim-church-2072d.firebasestorage.app",
    messagingSenderId: "345257256943",
    appId: "1:345257256943:web:27ebb7bbf67f15eadaf81a"
  };

  const appName = 'auth_허브';
  const fbApp = getApps().find(a=>a.name===appName) || initializeApp(firebaseConfig, appName);
  const auth = getAuth(fbApp);
  const db = getFirestore(fbApp);
  const provider = new GoogleAuthProvider();

  // 로그인 상태 확인
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      await checkUser(user);
    }
  });

  window.googleLogin = async function() {
    try {
      const result = await signInWithPopup(auth, provider);
      await checkUser(result.user);
    } catch(e) {
      console.log('로그인 오류:', e.message);
      if(e.code !== 'auth/popup-closed-by-user') {
        alert('로그인 오류: ' + e.message);
      }
    }
  };

  async function checkUser(user) {
    const uid = user.uid;
    const email = user.email;
    const name = user.displayName;
    const photo = user.photoURL;

    const userRef = doc(db, 'users', uid);
    const userSnap = await getDoc(userRef);

    if (userSnap.exists()) {
      const userData = userSnap.data();
      if (userData.approved) {
        enterApp(userData);
        // 실시간 승인 감지 (승인 취소 대비)
        onSnapshot(userRef, (snap) => {
          if(snap.exists() && !snap.data().approved) location.reload();
        });
      } else {
        showPending(name, email);
        // 실시간 승인 대기
        onSnapshot(userRef, (snap) => {
          if(snap.exists() && snap.data().approved) enterApp(snap.data());
        });
      }
    } else {
      showRegister(name, email, uid, photo);
    }
  }

  function showRegister(name, email, uid, photo) {
    document.getElementById('auth-card').innerHTML = `
      <h3>추가 정보 입력</h3>
      <p>처음 방문하셨군요!<br>이름과 소속을 확인해 주세요.</p>
      <input class="auth-input" id="reg-name" placeholder="이름" value="${name||''}">
      <input class="auth-input" id="reg-cell" placeholder="소속 셀" value="">
      <button class="auth-btn" onclick="window._submitReg('${uid}','${email}','${encodeURIComponent(photo||'')}')">가입 신청</button>
    `;
  }

  window._submitReg = async function(uid, email, photoEnc) {
    const name = document.getElementById('reg-name').value.trim();
    const cell = document.getElementById('reg-cell').value.trim();
    if(!name||!cell) { alert('이름과 소속을 입력해 주세요.'); return; }
    const photo = decodeURIComponent(photoEnc);
    await setDoc(doc(db,'users',uid), {
      email, name, cell, photo,
      approved: false, role: 'leader',
      createdAt: new Date().toISOString()
    });
    showPending(name, email);
    onSnapshot(doc(db,'users',uid), (snap) => {
      if(snap.exists() && snap.data().approved) enterApp(snap.data());
    });
  };

  function showPending(name, email) {
    document.getElementById('auth-card').innerHTML = `
      <div class="auth-pending">
        <div style="font-size:36px;margin-bottom:8px">⏳</div>
        <h3 style="color:#92400E;margin-bottom:6px">승인 대기중</h3>
        <p style="color:#B45309;font-size:13px">${name}님<br>${email}<br><br>관리자 승인 후<br>자동으로 입장됩니다</p>
      </div>
      <span class="auth-signout" onclick="window._fbSignOut()">다른 계정으로 로그인</span>
    `;
  }

  function enterApp(userData) {
    document.getElementById('auth-overlay').classList.add('hidden');
    window._currentUser = userData;
    if(typeof render === 'function') render();
  }

  window._fbSignOut = async function() {
    await auth.signOut();
    location.reload();
  };
</script>

  </div>

  <!-- 스와이프 바 -->
  <div id="swipe-bar" style="position:absolute;bottom:28px;left:50%;transform:translateX(-50%);width:120px;height:5px;background:rgba(255,255,255,0.35);border-radius:10px;overflow:hidden">

  </div>
</div>

let groups  = JSON.parse(localStorage.getItem('elim_엘림교회_엘림교회_Groups'))  || [];
let members = JSON.parse(localStorage.getItem('elim_엘림교회_엘림교회_Members')) || [];

// 첫 번째 그룹은 항상 헤더명, 두 번째는 항상 BEST
const APP_TITLE = '엘림교회';
const BEST_GROUP = 'BEST_엘림교회';

// ── 분류/그룹(Strategy B) ──
let categories = JSON.parse(localStorage.getItem('elim_엘림교회_엘림교회_Categories')) || null;
let catGroups  = JSON.parse(localStorage.getItem('elim_엘림교회_엘림교회_CatGroups'))  || {};
let selCat     = localStorage.getItem('elim_엘림교회_엘림교회_selCat') || 'cell';
let selCatPick = JSON.parse(localStorage.getItem('elim_엘림교회_엘림교회_selCatPick')) || {};

function initCategories(){
  if(!Array.isArray(categories) || !categories.length){
    categories=[
      {id:'cell',   name:'Elim',   selectMode:'single', includeInStats:true},
      {id:'edu',    name:'교육위원회', selectMode:'single', includeInStats:false},
      {id:'deacon', name:'제직회',     selectMode:'multi',  includeInStats:false},
    ];
  }
  if(!catGroups || typeof catGroups!=='object') catGroups={};
  categories.forEach(c=>{
    if(c.id==='cell') return;
    if(!Array.isArray(catGroups[c.id])) catGroups[c.id]=[];
  });
  // 기본 선택값
  categories.forEach(c=>{
    if(selCatPick[c.id]===undefined){
      selCatPick[c.id]=(c.selectMode==='multi')?[]:'all';
    }
  });
  if(!selCat || !categories.find(x=>x.id===selCat)) selCat='cell';
}
function catById(id){ return categories.find(c=>c.id===id)||categories[0]; }
function catName(id){ const c=catById(id); return c?c.name:id; }

function getCatGroupList(catId){
  if(catId==='cell'){
    return groups.filter(g=>g && g!==BEST_GROUP);
  }
  return (catGroups[catId]||[]).filter(Boolean);
}
function saveCatSel(){
  localStorage.setItem('elim_엘림교회_엘림교회_selCat', String(selCat||'cell'));
  localStorage.setItem('elim_엘림교회_엘림교회_selCatPick', JSON.stringify(selCatPick||{}));
}

function normMemberCats(){
  let changed=false;
  members = (members||[]).map(m=>{
    const mm={...m};
    if(!mm.catSel || typeof mm.catSel!=='object') { mm.catSel={}; changed=true; }
    // cell은 기존 group을 그대로 사용(호환). 단, 편의상 catSel.cell도 맞춰둠
    if(mm.group && mm.catSel.cell!==mm.group){ mm.catSel.cell=mm.group; changed=true; }
    categories.forEach(c=>{
      if(c.id==='cell') return;
      let v=mm.catSel[c.id];
      if(c.selectMode==='single'){
        if(Array.isArray(v)) { v=v[0]||'all'; changed=true; }
        if(v===undefined || v===null) { v='all'; changed=true; }
      } else {
        if(!Array.isArray(v)) { v=[]; changed=true; }
      }
      mm.catSel[c.id]=v;
    });
    return mm;
  });
  if(changed) save();
}

function setSelCat(id){ selCat=id; saveCatSel(); render(); }
function setCatAll(catId){
  const c=catById(catId);
  selCatPick[catId]=(c.selectMode==='multi')?[]:'all';
  saveCatSel();
  if(catId==='cell') selGrp='all';
  render();
}
function setCatPick(catId, g){
  selCatPick[catId]=g;
  saveCatSel();
  if(catId==='cell') selGrp=g;
  render();
}
function toggleCatPick(catId, g){
  const c=catById(catId);
  if(c.selectMode!=='multi'){ setCatPick(catId,g); return; }
  let a=selCatPick[catId];
  if(!Array.isArray(a)) a=[];
  a = a.includes(g) ? a.filter(x=>x!==g) : a.concat([g]);
  selCatPick[catId]=a;
  saveCatSel();
  render();
}

// (v21) 셀렉트 UI용: 분류/그룹 변경
function setFilterCat(catId){
  setSelCat(catId);
}
function setFilterGroup(catId, val){
  const c=catById(catId);
  // 전체
  if(val==='all'){
    setCatAll(catId);
    return;
  }
  // cell/single
  if(c.selectMode!=='multi'){
    setCatPick(catId, val);
    return;
  }
  // multi: 셀렉트 1개 선택만 지원(내부는 [val])
  selCatPick[catId]=[val];
  saveCatSel();
  render();
}


// 분류 관리(모달)
let mCatMgr=false;
let mEduMgr=false;
let eduTitles = null;
function loadEduTitles(){
  try{
    if(Array.isArray(eduTitles) && eduTitles.length) return eduTitles;
    const raw = localStorage.getItem('eduTitlesV1');
    if(raw){ const a=JSON.parse(raw); if(Array.isArray(a) && a.length){ eduTitles=a; return eduTitles; } }
  }catch(e){}
  eduTitles=['새가족교육','성경1독학교','양육과정','전도훈련','기타'];
  return eduTitles;
}
function saveEduTitles(){
  try{ localStorage.setItem('eduTitlesV1', JSON.stringify(eduTitles||[])); }catch(e){}
}
function openEduMgr(){ mEduMgr=true; loadEduTitles(); render(); }
function closeEduMgr(){ mEduMgr=false; render(); }
function openAddEduSchedFromCatMgr(){
  mCatMgr=false;
  // 교육일정(일정 추가 화면)으로 이동
  openAddEduSchedManage();
}
function openEduMgrFromCatMgr(){
  mCatMgr=false;
  openEduMgr();
}

function addEduTitle(){
  const n=prompt('교육 항목 추가');
  if(!n) return;
  loadEduTitles();
  if(eduTitles.includes(n)){ alert('이미 존재합니다'); return; }
  eduTitles.splice(Math.max(0,eduTitles.length-1),0,n); // '기타' 앞에 추가
  saveEduTitles(); render();
}
function delEduTitle(t){
  if(t==='기타') return;
  if(!confirm('삭제할까요?')) return;
  loadEduTitles();
  eduTitles=eduTitles.filter(x=>x!==t);
  if(!eduTitles.includes('기타')) eduTitles.push('기타');
  saveEduTitles(); render();
}


function openCatMgr(){ mCatMgr=true; render(); }
function closeCatMgr(){ mCatMgr=false; render(); }

// 셀원 등록: 현재 선택된 분류/그룹을 기본값으로 반영
function openAddMemSmart(){
  mAddMem=true;
  newMem = blankMem();
  // 1) 셀패밀리(cell) 기본 그룹
  const cellG = (selGrp==='all') ? groups[0] : selGrp;
  newMem.group = cellG;
  if(!newMem.catSel) newMem.catSel={};

function filterBySelCat(items){
  const cSel=(selCat||'cell');
  const cCfg=catById(cSel);
  const pick=selCatPick[cSel];
  return (items||[])
    .map(it=>{ if(!it.catId) it.catId='cell'; return it; })
    .filter(it=>{
      if((it.catId||'cell')!==cSel) return false;
      if(cCfg.selectMode==='multi'){
        if(!Array.isArray(pick) || pick.length===0) return true;
        return pick.includes(it.group);
      }
      if(!pick || pick==='all') return true;
      if(it.group==='all') return true;
      return it.group===pick;
    });
}

// 멤버 풀: 현재 선택된 분류+그룹 기준
function membersBySelCat(){
  const cSel=(selCat||'cell');
  const cCfg=catById(cSel);
  const pick=selCatPick[cSel];
  return (members||[]).filter(function(m){
    if(cSel==='cell'){
      if(m.group===BEST_GROUP) return false;

      if(selGrp==='all') return true;
      return m.group===selGrp;
    }
    const cs=(m.catSel||{});
    const v=cs[cSel];
    // A정책: non-cell 분류에서 '미지정'은 숨김
    if(v===undefined || v===null || v==='all') return false;
    if(cCfg.selectMode==='multi'){
      if(!Array.isArray(v) || v.length===0) return false;
      if(!Array.isArray(pick) || pick.length===0) return true;
      return v.some(x=>pick.includes(x));
    }
    // single
    if(!pick || pick==='all') return true;
    return v===pick;
  });
}

function _attRange(preset) {
  const now = new Date();
  const to = now.toISOString().slice(0,10);
  let from;
  if(preset==='month') {
    from = to.slice(0,7)+'-01';
  } else if(preset==='3month') {
    const d=new Date(now); d.setMonth(d.getMonth()-3); from=d.toISOString().slice(0,10);
  } else if(preset==='6month') {
    const d=new Date(now); d.setMonth(d.getMonth()-6); from=d.toISOString().slice(0,10);
  } else if(preset==='year') {
    from = to.slice(0,4)+'-01-01';
  } else {
    from = '2000-01-01';
  }
  return {from, to};
}

function setAttPreset(p) {
  attRangePreset = p;
  if(p !== 'custom') {
    const r = _attRange(p);
    attRangeFrom = r.from;
    attRangeTo   = r.to;
  }
  render();
}

function getWorshipDates(count=8) {
  // 오늘 기준 최근/앞으로 예배일 목록
  const worshipDows = [0,3,5,6];
  const dates = [];
  const ref = new Date(); ref.setHours(0,0,0,0);
  // 과거 포함 ±30일
  for(let i=-30; i<=30; i++) {
    const d = new Date(ref); d.setDate(d.getDate()+i);
    if(worshipDows.includes(d.getDay())) {
      dates.push(localDateStr(d));
    }
  }
  // 오늘 포함, 과거순 정렬, 최근 count개
  return dates.sort((a,b)=>b.localeCompare(a)).slice(0,count);
}

function getAtt(mid) {
  const m=members.find(x=>x.id===mid);
  return m?.attendance?.find(a=>a.date===attDate)||{status:'none',reason:''};
}
function updateReason(mid, reason) {
  members=members.map(m=>{
    if(m.id!==mid) return m;
    const att=[...(m.attendance||[])];
    const idx=att.findIndex(a=>a.date===attDate);
    if(idx>=0) att[idx]={...att[idx],reason};
    return {...m,attendance:att};
  });
  save();
}
function markAtt(mid, status) {
  // 결석 클릭 시 같은 그룹의 미체크 인원 자동 출석 처리
  if(status === 'absent') {
    const grpMembers = members.filter(m => (selGrp==='all' || m.group === members.find(x=>x.id===mid)?.group) && m.group !== BEST_GROUP);
    members = members.map(m => {
      const isTarget = m.id === mid;
      const att = [...(m.attendance||[])];
      const idx = att.findIndex(a=>a.date===attDate);
      const existing = idx>=0 ? att[idx] : null;
      // 대상: 결석으로, 미체크인 동그룹원: 출석으로
      const newStatus = isTarget ? 'absent' : (existing ? existing.status : 'present');
      const rec = {date:attDate, status:newStatus, reason: isTarget ? '' : (existing?.reason||'')};
      if(isTarget || (!existing && grpMembers.find(gm=>gm.id===m.id))) {
        if(idx>=0) att[idx]=rec; else att.push(rec);
      }
      return {...m, attendance:att};
    });
  } else {
    members = members.map(m => {
      if(m.id!==mid) return m;
      const att=[...(m.attendance||[])];
      const idx=att.findIndex(a=>a.date===attDate);
      const rec={date:attDate,status,reason:''};
      if(idx>=0) att[idx]=rec; else att.push(rec);
      return {...m,attendance:att};
    });
  }
  save(); render();
}
function addAttRec() {
  if(!newAttRec.date){ alert('날짜를 선택하세요'); return; }
  members=members.map(m=>{
    if(m.id!==selMem.id) return m;
    const att=[...(m.attendance||[])];
    const idx=att.findIndex(a=>a.date===newAttRec.date);
    if(idx>=0) att[idx]={...newAttRec}; else att.push({...newAttRec});
    return {...m,attendance:att};
  });
  save(); selMem=members.find(m=>m.id===selMem.id);
  const wasEditing = newAttRec.editing||false;
  newAttRec={date:today(),status:'present',reason:''};
  mAddAtt=false; if(!wasEditing) alert('출석 기록이 추가되었습니다!'); render();
}

  members=members.map(m=>m.id===mid?{...m,attendance:m.attendance.filter(a=>a.date!==date)}:m);

  if(!phone){ alert('번호 없음'); return; }

function kakao(phone, kakaoId) {
  // 카카오 ID가 있으면 ID로 바로 연결
  if(kakaoId && kakaoId.trim()) {
    window.location.href='kakaotalk://open/id/'+encodeURIComponent(kakaoId.trim());
    return;
  }
  // 없으면 전화번호로 시도
  if(!phone){ alert('카카오ID 또는 번호가 없습니다'); return; }
  const digits=phone.replace(/[^0-9]/g,'');
  const intl=digits.startsWith('0')?'+82'+digits.slice(1):'+'+digits;
  const iframe=document.createElement('iframe');
  iframe.style.display='none'; document.body.appendChild(iframe);
  let opened=false;
  const t=setTimeout(()=>{
    if(!opened){
      document.body.contains(iframe)&&document.body.removeChild(iframe);
      if(navigator.clipboard){
        navigator.clipboard.writeText(phone).then(()=>alert('📋 번호 복사됨!\n'+phone+'\n\n카카오톡 친구검색에 붙여넣기 하세요.'));
      } else { prompt('카카오톡 친구검색:', phone); }
    }
  },1500);
  window.addEventListener('blur',()=>{ opened=true; clearTimeout(t); document.body.contains(iframe)&&document.body.removeChild(iframe); },{once:true});
  iframe.src='kakaotalk://profile?phoneNumber='+encodeURIComponent(intl);
}

  const grpMembers = membersBySelCat();

  bulkMsg=bulkMsg||'';
  // (v7) 매번 열 때마다 새조합(앞말/마무리말) 생성
  // 본문이 비어있을 때만 기본 본문 자동 채움
  const keepBodyBulk = String(bulkMsg||'').trim();
  const keepBodyPersonal = String(personalMsg||'').trim();
  smsMode='bulk';
  bulkMsg = buildAiHomeSMS({});
  if(keepBodyBulk){
    // 기존 본문 보존: opener/closer만 새로 뽑기 위해 body 부분만 교체
    // (간단 방식) bulkMsg 전체를 다시 만들지 않고, 기존 본문을 body로 넣어 재조합
    bulkMsg = buildAiHomeSMS({}) ;
    // 위 조합은 baseVars 기반이므로, 기존 본문을 강제로 넣기
    // (최종) opener/closer 랜덤 + body 고정
    const tmp = bulkMsg;
    bulkMsg = tmp.split('\n\n');
    bulkMsg = [bulkMsg[0]||'', keepBodyBulk, bulkMsg[2]||''].filter(Boolean).join('\n\n');
  }
  smsMode='personal';
  personalMsg = buildAiHomeSMS({});
  if(keepBodyPersonal){
    const tmp = personalMsg;
    const parts = tmp.split('\n\n');
    personalMsg = [parts[0]||'', keepBodyPersonal, parts[2]||''].filter(Boolean).join('\n\n');
  }
  smsMode='bulk';
  bulkFiles=[];
  mBulkSMS=true;
  render();

  try{ setTimeout(()=>{ try{_updateBmPreview();}catch(e){} },0); }catch(e){}
}

function gradeTitle(grade) {
  if(!grade || grade==='세례' || grade==='학습') return '성도님';
  if(grade==='집사') return '집사님';
  if(grade==='권사') return '권사님';
  if(grade==='장로') return '장로님';
  if(grade==='목사') return '목사님';
  return grade+'님';
}

// (v9l) {신급}님 패턴에서 님 중복 방지용
function gradeBare(grade){
  grade = (grade===undefined||grade===null) ? '' : String(grade);
  if(!grade || grade==='세례' || grade==='학습') return '성도';
  return grade.replace(/님$/,'');
}

function _loadAiSmsLib(){
  try{
    const raw = localStorage.getItem(AI_SMS_LIB_KEY);
    if(!raw) return _defaultAiSmsLib();
    const lib = JSON.parse(raw);
    const def = _defaultAiSmsLib();
    lib.churchName = lib.churchName || def.churchName;
    lib.group = lib.group || def.group;
    lib.personal = lib.personal || def.personal;
    ['all','present','absent'].forEach(k=>{
      lib.group[k] = lib.group[k] || def.group[k];
      lib.personal[k] = lib.personal[k] || def.personal[k];
      lib.group[k].openers = Array.isArray(lib.group[k].openers)?lib.group[k].openers:[];
      lib.group[k].closers = Array.isArray(lib.group[k].closers)?lib.group[k].closers:[];
      lib.group[k].bodies  = Array.isArray(lib.group[k].bodies) ? lib.group[k].bodies : [];
      lib.personal[k].openers = Array.isArray(lib.personal[k].openers)?lib.personal[k].openers:[];
      lib.personal[k].closers = Array.isArray(lib.personal[k].closers)?lib.personal[k].closers:[];
      lib.personal[k].bodies  = Array.isArray(lib.personal[k].bodies) ? lib.personal[k].bodies : [];
    });
    // (v8) themes 정규화: openers/closers/bodies 보장
    ['group','personal'].forEach(kind=>{
      const th = lib[kind] && lib[kind].themes ? lib[kind].themes : null;
      if(!th) return;
      Object.keys(th).forEach(tk=>{
        th[tk] = th[tk] || {};
        th[tk].openers = Array.isArray(th[tk].openers)? th[tk].openers : [];
        th[tk].closers = Array.isArray(th[tk].closers)? th[tk].closers : [];
        th[tk].bodies  = Array.isArray(th[tk].bodies) ? th[tk].bodies  : [];
      });
    });
  // (v9_NORMALIZE_ENDINGS) endings(마무리 인사) + fixedTop + schedule defaults 보정
  try{
    if(!lib.fixedTop) lib.fixedTop={ line1:'2026년 설립 30주년', line2:'다시 십자가 앞에' };
    if(!lib.fixedTop.line1) lib.fixedTop.line1='2026년 설립 30주년';

      });

      if(lib[kind].themes){
        Object.keys(lib[kind].themes).forEach(function(t){
          var tp=lib[kind].themes[t]||{};
          if(!Array.isArray(tp.endings)) tp.endings=[ '주님의 평강이 함께 하시길 축복합니다.' ];
          if(!Array.isArray(tp.openers)) tp.openers=[];

          lib[kind].themes[t]=tp;

    if(!lib.schedule) lib.schedule={themes:{}};

      if(!Array.isArray(t.closers)) t.closers=[];
      if(!Array.isArray(t.blessings)) t.blessings=[];
    });
  }catch(e){}


    return lib;
  }catch(e){
    return _defaultAiSmsLib();
  }
}

function _hashStr(s){
  let h=2166136261;
  for(let i=0;i<s.length;i++){
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return (h>>>0);
}


function _pickOne(arr, seedStr){

  let idx = Math.floor(Math.random()*arr.length);
  if(arr.length>1 && idx===last){ idx = (idx+1) % arr.length; }
  try{ sessionStorage.setItem(key, String(idx)); }catch(e){}
  return String(arr[idx]||'').trim();
}

// (v8d) 인사말 + 말씀 1구절 규칙
function _defaultGreeting(kind, merged){
  const v=merged||{};
  const cn=v['교회명']||v.churchName||'엘림교회';
  const svc=v['예배명']||v.serviceName||v['테마']||v.theme||'예배';
  if(kind==='group'){
    return cn+' '+svc+' 인사드립니다.';
  }
  const nm=v['이름']||v.name||'';
  const gd=v['신급']||v.grade||'';
  const who=(nm||gd)?(nm+' '+gd+'님, ').replace(/\s+/g,' ').trim()+' ':'';
  return who+cn+'에서 '+svc+' 안내드립니다.';
}
function _isVerseLike(s){
  s=String(s||'');
  if(!s) return false;
  // 성경 구절처럼 보이는 패턴(따옴표 + 장절)
  if(/[\"“”]/.test(s) && /\d+\s*:\s*\d+/.test(s)) return true;
  if(/[\"“”]/.test(s) && /(시|마|요|히|약|사|빌|골|벧|롬|창|출|레|민|신|수|삿|룻|삼상|삼하|왕상|왕하|대상|대하|느|에|욥|잠|전|아|렘|겔|단|호|욜|암|옵|욘|미|나|합|습|학|슥|말|행|고전|고후|갈|엡|빌|살전|살후|딤전|딤후|딛|몬|히|약|벧전|벧후|요일|요이|요삼|유|계)\s*/.test(s)) return true;
  return false;
}

function buildAiHomeSMS(vars){
  const lib=_loadAiSmsLib();
  const kind=_homeSmsKind();
  const tab=_homeSmsTab();

  const baseVars = _homeVars(kind);
  const merged = Object.assign({}, baseVars, (vars||{}));

  // 테마 결정: auto이면 요일 기반 추천
  let theme = (smsTheme||'auto');
  if(theme==='auto'){
    const d=new Date();
    const dow = d.getDay(); // 0=일
    if(dow===0) theme='sunday';
    else if(dow===3) theme='wednesday';
    else theme='general';
  }

  const seed = kind+'|'+tab+'|'+theme+'|'+(merged.group||'')+'|'+(merged.name||merged['이름']||'');

  // 1) 우선: 테마 팩
  let openArr=[], closeArr=[];
  try{
    const tp = lib[kind] && lib[kind].themes && lib[kind].themes[theme];
    if(tp){
      openArr = tp.openers || [];
      closeArr = tp.closers || [];
    }
  }catch(e){}

  // 2) 보조: (전체/출석/결석) 기본 풀
  if(!openArr.length){
    openArr = (lib[kind] && lib[kind][tab] && lib[kind][tab].openers) ? lib[kind][tab].openers : [];
  }
  if(!closeArr.length){
    closeArr= (lib[kind] && lib[kind][tab] && lib[kind][tab].closers) ? lib[kind][tab].closers : [];
  }

  function isV(x){ try{return _isVerseLike(x);}catch(_){return false;} }
  function oneLine(x){
    x=String(x||'').replace(/\r/g,'').trim();
    if(!x) return '';
    return x.split('\n').map(s=>String(s||'').trim()).filter(Boolean)[0]||'';
  }

  // (v9h) openers 안에 들어있는 말씀(구버전) 제거 → verseCandidates로만 사용
  const verseCandidates=[].concat((closeArr||[]).filter(isV), (openArr||[]).filter(isV));
  const verseUniq=verseCandidates.filter((v,i,a)=>a.indexOf(v)===i);
  const greetCandidates=(openArr||[]).filter(x=>!isV(x));

  let greeting = _applyVars(oneLine((_pickOne(greetCandidates, seed+'|g') || _defaultGreeting(kind, merged))), merged);
  let verse = _applyVars(oneLine(_pickOne(verseUniq, seed+'|v')), merged);

  // (v9l) 개인문자: 머릿말/말씀에서 이름·신급 치환키 제거(요청)
  if(kind==='personal'){
    const rx=/^\s*\{이름\}\s*\{신급\}님,?\s*/;
    greeting = String(greeting||'').replace(rx,'').trim();
    verse    = String(verse||'').replace(rx,'').trim();
    greeting = greeting.replace(/\{이름\}|\{신급\}/g,'').replace(/\s{2,}/g,' ').trim();
    verse    = verse.replace(/\{이름\}|\{신급\}/g,'').replace(/\s{2,}/g,' ').trim();
  }

  // 본문: 사용자가 입력한 본문 우선 → 없으면 테마 본문 → 없으면 기본 안내
  let base='';
  if(kind==='group') base = '{교회명} 안내드립니다. ({예배명})';
  else base = '{이름} {신급}님, {교회명}에서 연락드립니다. ({예배명})';

  const curBody = (kind==='group') ? (bulkMsg||'') : (personalMsg||'');
  let bodyRaw = String(curBody).trim();
  if(!bodyRaw){
    try{
      const tp = lib[kind] && lib[kind].themes && lib[kind].themes[theme];
      const bArr = tp && Array.isArray(tp.bodies) ? tp.bodies : [];
      bodyRaw = _pickOne(bArr, seed+'|b');
    }catch(e){}
  }
  if(!bodyRaw) bodyRaw = base;
  const body = _applyVars(String(bodyRaw||'').trim(), merged);

  // 상단 고정문구
  const fixed1 = (lib.fixedTop && lib.fixedTop.line1) ? String(lib.fixedTop.line1).trim() : '';
  const fixed2 = (lib.fixedTop && lib.fixedTop.line2) ? String(lib.fixedTop.line2).trim() : '';

  // 마무리 인사(endings)
  let endArr=[];
  try{
    const tp = lib[kind] && lib[kind].themes && lib[kind].themes[theme];
    if(tp && Array.isArray(tp.endings)) endArr = tp.endings;
  }catch(e){}
  if(!endArr.length){
    try{ endArr = (lib[kind] && lib[kind][tab] && Array.isArray(lib[kind][tab].endings)) ? lib[kind][tab].endings : []; }catch(e){}
  }
  const ending = _applyVars(oneLine(_pickOne(endArr, seed+'|e') || ''), merged);

  // (v9h) 중복 제거 + 1구절 1줄 유지
  const parts=[fixed1,fixed2,greeting,verse,body,ending].map(oneLine);
  const uniq=[];
  parts.forEach(p=>{ if(p && uniq.indexOf(p)===-1) uniq.push(p); });
  return uniq.join('\n\n');
}

/* v8e_PARTIAL_EDIT_BUTTONS: 머릿말만/말씀만 변경 (본문 유지) */
function _v8e_chooseTheme(){
  let theme = (smsTheme||'auto');
  if(theme==='auto'){
    const d=new Date();
    const dow=d.getDay();
    if(dow===0) theme='sunday';
    else if(dow===3) theme='wednesday';
    else theme='general';
  }
  return theme;
}
function _v8e_trimEmptyLines(arr){
  while(arr.length && String(arr[0]).trim()==='') arr.shift();
  while(arr.length && String(arr[arr.length-1]).trim()==='') arr.pop();
  return arr;
}
function _v8e_splitMsg3(text){
  const raw = String(text||'').replace(/\r\n/g,'\n');
  let lines = raw.split('\n');
  lines = _v8e_trimEmptyLines(lines);
  if(lines.length>=3){
    return { greeting: lines[0], body: lines.slice(1,-1).join('\\n'), verse: lines[lines.length-1] };
  }
  if(lines.length===2){
    return { greeting: lines[0], body: '', verse: lines[1] };
  }
  if(lines.length===1){
    return { greeting: '', body: lines[0], verse: '' };
  }
  return { greeting:'', body:'', verse:'' };
}
function _v8e_getPools(){
  const lib=_loadAiSmsLib();
  const kind=_homeSmsKind();
  const tab=_homeSmsTab();
  const theme=_v8e_chooseTheme();

  let openArr=[], closeArr=[];
  try{
    const tp = lib[kind] && lib[kind].themes && lib[kind].themes[theme];
    if(tp){
      openArr = tp.openers || [];
      closeArr = tp.closers || [];
    }
  }catch(e){}

  if(!openArr.length){ openArr = (lib[kind] && lib[kind][tab] && lib[kind][tab].openers) ? lib[kind][tab].openers : []; }
  if(!closeArr.length){ closeArr = (lib[kind] && lib[kind][tab] && lib[kind][tab].closers) ? lib[kind][tab].closers : []; }

  // (v8d 호환) openers에 말씀만 있고 closers가 비어있는 경우
  let greetArr=openArr||[];
  let verseArr=closeArr||[];
  try{
    if((!verseArr || !verseArr.length) && (greetArr && greetArr.length)){
      const verseLike = greetArr.filter(x=>_isVerseLike(x));
      if(verseLike.length>=1){ verseArr = verseLike; greetArr = []; }
    }
  }catch(e){}

  return { lib, kind, tab, theme, greetArr, verseArr };
}
function _v8e_vars(){
  const kind=_homeSmsKind();
  const lib=_loadAiSmsLib();
  const v = Object.assign({}, _homeVars(kind));
  try{ v.churchName = lib.churchName || v.churchName || v['교회명']; }catch(e){}

// (v9j) 6파트 메시지 파서/세터 (고정2줄 + 인사 + 말씀 + 본문 + 마무리)
function _splitMsg6(text){
  const lib=_loadAiSmsLib();
  const fixed1 = (lib.fixedTop&&lib.fixedTop.line1)?String(lib.fixedTop.line1).trim():'';
  const fixed2 = (lib.fixedTop&&lib.fixedTop.line2)?String(lib.fixedTop.line2).trim():'';
  const parts = String(text||'').replace(/\r/g,'').split(/\n\n+/).map(t=>t.trim()).filter(Boolean);

  let p=parts.slice();
  if(p.length && fixed1 && p[0]===fixed1) p.shift();
  if(p.length && fixed2 && p[0]===fixed2) p.shift();

  return { greeting:p[0]||'', verse:p[1]||'', body:p[2]||'', ending:p[3]||'' };
}

function _updateBmPreview(){
  try{
    const pv=document.getElementById('bmPreview');
    const el=document.getElementById('bmArea');
    if(!pv || !el) return;

    const grpMembers = (typeof membersBySelCat==='function') ? membersBySelCat() : (members||[]);
    let pool = grpMembers;
    try{
      const cSel = (typeof selCat!=='undefined' && selCat) ? selCat : 'cell';
      if(cSel==='cell' && typeof selGrp!=='undefined' && selGrp && selGrp!=='all'){
        pool = grpMembers.filter(m=>m.group===selGrp);
      }
    }catch(_){ }

    const sel = (pool||[]).filter(m=>bulkSel && bulkSel[m.id] && m.phone);
    const sample = sel[0] || (pool||[])[0];

    const t = String(el.value||'');
    let out = t;
    if(sample){
      const useBare = /\{신급\}님/.test(t);
      const g = useBare ? gradeBare(sample.grade) : (typeof gradeTitle==='function'?gradeTitle(sample.grade): (sample.grade||''));
      out = out.replace(/\{이름\}/g, sample.name||'')
               .replace(/\{신급\}/g, g)
               .replace(/님님/g,'님');
    }
    pv.textContent = out;
  }catch(e){}
}

function _updatePmPreview(){
  try{
    const pv=document.getElementById('pmPreview');
    const el=document.getElementById('pmArea');
    if(!pv || !el) return;
    const grpMembers = (typeof membersBySelCat==='function') ? membersBySelCat() : (members||[]);
    const sel = (grpMembers||[]).filter(m=>bulkSel && bulkSel[m.id] && m.phone);
    if(!sel.length) return;
    const prev = sel[Math.min(personalIdx, sel.length-1)];
    if(!prev) return;

    const useBare = /\{신급\}님/.test(t);
    const g = useBare ? gradeBare(prev.grade) : (typeof gradeTitle==='function'?gradeTitle(prev.grade):'');
    pv.textContent = t.replace(/\{이름\}/g, prev.name)
                     .replace(/\{신급\}/g, g)
                     .replace(/님님/g,'님');
  }catch(e){}
}

function sendPersonalSMS(){
  try{
    // 선택대상: 단체문자와 동일하게 bulkSel 사용
    const grpMembers = (typeof membersBySelCat==='function') ? membersBySelCat() : (members||[]);
    const sel = (grpMembers||[]).filter(m=>bulkSel && bulkSel[m.id] && m.phone);
    if(!sel.length){ alert('수신자를 선택하세요'); return; }

    // idx 보정
    if(typeof personalIdx!=='number') personalIdx=0;
    if(personalIdx<0) personalIdx=0;
    if(personalIdx>=sel.length) personalIdx=0;

    const m = sel[personalIdx] || sel[0];
    if(!m || !m.phone){ alert('번호 없음'); return; }

    // 메시지 가져오기: 전역 personalMsg 우선, 없으면 textarea에서
    let tmpl = (typeof personalMsg==='string' ? personalMsg : '') || '';
    try{
      const ta=document.getElementById('pmArea');
      if(ta && ta.value && ta.value.trim()) tmpl = ta.value;
    }catch(_){ }

    if(!tmpl.trim()){ alert('메시지를 입력하세요'); return; }

    const name = m.name || '';

    // (v9l) 템플릿에 {신급}님 이 있으면 gradeBare 사용(성도님님 방지)
    const ta2 = (function(){ try{ return document.getElementById('pmArea'); }catch(_){ return null; } })();
    const tmpl2 = (ta2 && ta2.value) ? String(ta2.value) : String(tmpl||'');
    const useBare = /\{신급\}님/.test(tmpl2);
    const grade = useBare ? gradeBare(m.grade) : ((typeof gradeTitle==='function') ? gradeTitle(m.grade) : '');

    let msg = tmpl
      .replace(/\{이름\}/g, name)
      .replace(/\{신급\}/g, grade);
    msg = msg.replace(/님님/g,'님');

    // 중요: 여기서 모달 종료(mBulkSMS=false)나 홈(view='list')로 이동하지 않는다.
    personalPendingAdvance = true; personalLastSendAt = Date.now();
    window.location.href = 'sms:' + m.phone + '?body=' + encodeURIComponent(msg);

  }catch(err){
    try{ alert('개인문자 오류: ' + (err && err.message ? err.message : err)); }catch(_){ }
  }
}

// ── 감성 문구(오프라인/룰 기반) ──
function _hashStr(s){
  s=String(s||'');
  let h=2166136261;
  for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=(h*16777619)>>>0; }
  return h>>>0;
}
function _pick(arr, seed){
  if(!arr||!arr.length) return '';
  return arr[_hashStr(seed)%arr.length];
}

    if(typeof selGrp==='string' && selGrp && selGrp!=='all' && selGrp!==BEST_GROUP) return selGrp;
  }catch(e){}
  return APP_TITLE;
}
function sharePoolByGroup(g){
  g=g||APP_TITLE;
  // 전원표시: 전화번호 없어도 포함(전송 시점에만 필터)
  return members.filter(function(m){return m.group===g && m.group!==BEST_GROUP;});
}

function sharePoolBySelGrp(){
  try{
    if(typeof selGrp==='string' && selGrp==='all') return members.filter(function(m){return m.group!==BEST_GROUP;});
    return sharePoolByGroup(selGrp);
  }catch(e){
    return sharePoolByGroup(APP_TITLE);
  }
}

// 분류+그룹 기반 공유 대상
function sharePoolByOwner(catId, g){
  catId=catId||'cell';
  if(catId==='cell'){
    if(!g || g==='all') return sharePoolBySelGrp();
    return sharePoolByGroup(g);
  }
  // non-cell: 해당 분류 소속자 중, 그룹(g)에 속한 사람만
  return members.filter(function(m){
    const cs=(m.catSel||{});
    const v=cs[catId];
    if(typeof v==='string'){
      if(v==='all') return false;
      return v===g;
    }
    if(Array.isArray(v)){
      if(v.length===0) return false;
      return v.includes(g);
    }
    return false;
  });
}

  const pCnt=pList.length, aCnt=aList.length, total=grpMems.length;
  const rate=(pCnt+aCnt)>0 ? Math.round(pCnt/(pCnt+aCnt)*100) : 0;

  })();

  const lib=_loadAiSmsLib();
  const fixed1=(lib.fixedTop&&lib.fixedTop.line1)?String(lib.fixedTop.line1).trim():'';
  const fixed2=(lib.fixedTop&&lib.fixedTop.line2)?String(lib.fixedTop.line2).trim():'';

  lines.push('■ 출석률: '+rate+'%');

// (v9j) 공유 메시지 상단 고정문구 중복 방지
function _normFixedTopMsg(msg){
  try{
    const lib=_loadAiSmsLib();
    const f1=(lib.fixedTop&&lib.fixedTop.line1)?String(lib.fixedTop.line1).trim():'';
    const f2=(lib.fixedTop&&lib.fixedTop.line2)?String(lib.fixedTop.line2).trim():'';
    let lines=String(msg||'').replace(/\r/g,'').split(/\n/);
    while(lines.length && !String(lines[0]||'').trim()) lines.shift();

    function startsFixed(arr){
      if(!arr.length) return false;
      if(f1 && arr[0]!==f1) return false;
      if(f2){
        if(arr.length<2) return false;
        if(arr[1]!==f2) return false;
      }
      return (f1||f2)?true:false;
    }

    if(!startsFixed(lines)) return lines.join('\n');

    const head=[];
    if(f1) head.push(lines.shift());
    if(f2) head.push(lines.shift());
    while(startsFixed(lines)){
      if(f1) lines.shift();
      if(f2) lines.shift();
    }
    return head.concat(lines).join('\n');
  }catch(e){
    return String(msg||'');
  }
}

function _pad2(n){return String(n).padStart(2,'0');}
function localNowStr(){
  const d=new Date();
  return d.getFullYear()+'-'+_pad2(d.getMonth()+1)+'-'+_pad2(d.getDate())+'T'+_pad2(d.getHours())+':'+_pad2(d.getMinutes());
}
function _addDaysLocal(dateStr, n){
  var d=new Date(dateStr+'T00:00');
  d.setDate(d.getDate()+n);
  return localDateStr(d);
}
function calcAutoSmsSendAt(s){
  try{
    if(!s || !s.autoSmsOn) return '';
    if((s.autoSmsMode||'days_before')==='at'){
      return String(s.autoSmsAt||'');
    }
    var days = parseInt(s.autoSmsDays||1);
    if(isNaN(days)) days=1;
    if(days<0) days=0;
    if(days>60) days=60;
    var tm = String(s.autoSmsTime||'09:00');
    if(!tm || tm.length<4) tm='09:00';
    var sd=_addDaysLocal(s.date, -days);
    return sd+'T'+tm;
  }catch(e){ return ''; }
}

    var fixed2=(lib.fixedTop&&lib.fixedTop.line2)?String(lib.fixedTop.line2).trim():'';

    var gname=_schedGroupName(s);
    var theme=(s && s.schedTheme)?String(s.schedTheme):_schedThemeId(s);
    var tp=(lib.schedule&&lib.schedule.themes&&lib.schedule.themes[theme])?lib.schedule.themes[theme]:((lib.schedule&&lib.schedule.themes&&lib.schedule.themes.general)?lib.schedule.themes.general:{});

    var verse=_pickOne((tp.closers||[]), 'sched|'+theme+'|v|'+Date.now());
    var blessing=_pickOne((tp.blessings||[]), 'sched|'+theme+'|b|'+Date.now());

    // 일정안내(요청: [그룹명] 일정안내 + 날짜/시간/장소)
    var header='['+gname+'] 일정안내';
    var linkOn = (s && s.autoSmsLink!==false);
    var titleLine = linkOn ? ('일정: '+(s.title||'')) : '';
    var dateLine  = linkOn ? ('날짜: '+(s.date||'')) : '';
    var timeLine  = linkOn ? ('시간: '+(s.time||'')) : '';
    var placeLine = linkOn ? ('장소: '+(s.place||'')) : '';

    var mode=(s.autoSmsTextMode||'ai');
    if(mode==='basic'){
      return [header,titleLine,dateLine,timeLine,placeLine].join('\n');
    }

    var extra = s.autoSmsManual ? ('\n\n'+s.autoSmsManual) : '';

    // 최종 포맷
    var lines=[fixed1,fixed2];
    if(verse) lines.push(verse);
    lines.push('');
    lines.push(header);
    if(titleLine) lines.push(titleLine);
    if(dateLine) lines.push(dateLine);
    if(timeLine) lines.push(timeLine);
    if(placeLine) lines.push(placeLine);
    if(blessing){ lines.push(''); lines.push(blessing); }
    var msg=lines.filter(function(x){return String(x||'').trim()!=='';}).join('\n');
    return msg+extra;

  }catch(e){
    return '[일정안내]\n'+((s&&s.title)||'')+'\n'+((s&&s.date)||'');
  }
}

function _normPhone(p){
  p=String(p||'');
  var d=p.replace(/[^0-9]/g,'');
  if(d.startsWith('82') && d.length>=10) d='0'+d.slice(2);
  return d||p;
}
function _uniqPhones(arr){
  var out=[]; var seen={};
  (arr||[]).forEach(function(p){
    if(!p) return;
    var k=_normPhone(p);
    if(!k) return;
    if(seen[k]) return;
    seen[k]=1;
    out.push(p);
  });
  return out;
}

// 매월 N번째 특정 요일 → 날짜 계산 (week:-1=마지막)
function localDateStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getNthWeekday(year,month,week,day){
  // day: 0=일,1=월,...,6=토 / week: 1~4=첫째~넷째, -1=마지막
  if(week===-1){
    var last=new Date(year,month+1,0); // 월 말일
    var diff=(last.getDay()-day+7)%7;
    return new Date(year,month,last.getDate()-diff);
  }
  var first=new Date(year,month,1);
  var diff2=(day-first.getDay()+7)%7;
  return new Date(year,month,1+diff2+(week-1)*7);
}
function addDays(dt,n){var d=new Date(dt+'T00:00');d.setDate(d.getDate()+n);return localDateStr(d);}
function addMonths(dt,n){var d=new Date(dt+'T00:00');d.setMonth(d.getMonth()+n);return localDateStr(d);}

function addSched() {
  const s=newSched;
  if(!s.catId) s.catId='cell';
  if(!s.group) s.group = (s.catId==='cell') ? (selGrp==='all'?'all':selGrp) : 'all';
  if(!s.title||!s.date){alert('제목과 날짜를 입력한 뒤, [일정 추가]를 눌러주세요');return;}
  const rgId=s.repeat!=='none'?Date.now()+Math.random():null;
  schedules.push({...s,id:Date.now(),repeatGroupId:rgId});
  // repeatCount 방식: N회 반복
  if(s.repeat!=='none'&&(s.repeatCount||4)>1){
    const totalExtra=(s.repeatCount||4)-1;
    const startD=new Date(s.date+'T00:00');
    let mOff=0;
    for(let si=0;si<totalExtra&&si<104;si++){
      let nd;
      if(s.repeat==='weekly'){
        nd=addDays(s.date,(s.weekInterval||1)*7*(si+1));
      } else if(s.repeat==='biweekly'){
        nd=addDays(s.date,14*(si+1));
      } else if(s.repeat==='monthly'){
        mOff+=(s.nthInterval||1);
        if(s.monthlyMode==='nth'){
          const yr=startD.getFullYear()+Math.floor((startD.getMonth()+mOff)/12);
          const mo=(startD.getMonth()+mOff)%12;
          const ref=getNthWeekday(yr,mo,s.refWeek||1,s.refDay||0);
          const off=new Date(ref); off.setDate(ref.getDate()+(s.dayOffset||0));
          nd=localDateStr(off);
        } else {
          nd=addMonths(s.date,mOff);
        }
      }
      schedules.push({...s,id:Date.now()+si+1,date:nd,repeatGroupId:rgId});
    }
  }
  save(); mAddSched=false; newSched=blankSched(); render();
}

function calcSeriesDates(s, cnt) {
  // s: 설정 객체, cnt: 총 회수. 첫번째 날짜는 s.date 기준으로 해당 월/주 재계산
  const startD = new Date(s.date+'T00:00');
  const dates = [];
  let mOff = 0;
  for(let i=0;i<cnt;i++){
    let nd;
    if(i===0){
      if(s.repeat==='monthly'&&s.monthlyMode==='nth'){
        const r0=getNthWeekday(startD.getFullYear(),startD.getMonth(),s.refWeek||1,s.refDay||0);
        const o0=new Date(r0); o0.setDate(r0.getDate()+(s.dayOffset||0)); nd=localDateStr(o0);
      } else { nd=localDateStr(startD); }
    } else {
      if(s.repeat==='weekly'){ nd=addDays(dates[0],(s.weekInterval||1)*7*i); }
      else if(s.repeat==='biweekly'){ nd=addDays(dates[0],14*i); }
      else if(s.repeat==='monthly'){
        mOff+=(s.nthInterval||1);
        const yr=startD.getFullYear()+Math.floor((startD.getMonth()+mOff)/12);
        const mo=(startD.getMonth()+mOff)%12;
        if(s.monthlyMode==='nth'){
          const r=getNthWeekday(yr,mo,s.refWeek||1,s.refDay||0);
          const o=new Date(r); o.setDate(r.getDate()+(s.dayOffset||0)); nd=localDateStr(o);
        } else { nd=addMonths(dates[0],mOff); }
      }
    }
    dates.push(nd);
  }
  return dates;
}
function updateSched() {
  if(!editSched.title||!editSched.date){alert('날짜와 제목을 입력하세요');return;}
  if(editSched.repeatGroupId){
    const gId=editSched.repeatGroupId;
    const grp=schedules.filter(x=>x.repeatGroupId===gId).sort((a,b)=>a.date<b.date?-1:1);
    const cnt=grp.length;
    // 날짜 재계산 (editSched.date 기준 월/주 적용)
    const newDates=calcSeriesDates(editSched,cnt);
    // 각 항목 업데이트
    grp.forEach(function(gs,i){
      schedules=schedules.map(function(sc){
        return sc.id===gs.id
          ? Object.assign({},sc,editSched,{id:gs.id,date:newDates[i]})
          : sc;
      });
    });
  } else {
    schedules=schedules.map(s=>s.id===editSched.id?{...editSched}:s);
  }
  save(); mEditSched=false; render();
}

      if(parsed.inspired)     m.qtInspired    = parsed.inspired;
      if(parsed.truth)        m.qtTruth       = parsed.truth;
      if(parsed.decision)     m.qtDecision    = parsed.decision;
      if(parsed.application)  m.qtApplication = parsed.application;
    }
  } catch(e) {
    alert('AI 자동채움 오류: '+e.message);
  }
  meetAiLoading=false; render();
}

// JSON 가져오기 (다른 앱 백업파일 병합)
function importJSON(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if(!data.members || !Array.isArray(data.members)) {
        alert('❌ 올바른 백업 파일이 아닙니다'); return;
      }
      // 그룹 병합 (없는 그룹만 추가)
      let addedGroups = 0;
      (data.groups||[]).forEach(g => {
        if(g && !groups.includes(g)) { groups.push(g); addedGroups++; }
      });
      // 멤버 병합 (이름+전화번호 기준 중복 체크)
      let addedMembers = 0, skipped = 0;
      data.members.forEach(m => {
        const dup = members.find(x => x.name === m.name && x.phone === m.phone);
        if(dup) { skipped++; return; }
        const newMem = {...m, id: Date.now() + Math.random()};
        members.push(newMem);
        addedMembers++;
      });
      save();
      render();
      input.value = '';
      alert(`✅ 가져오기 완료!\n셀원 ${addedMembers}명 추가\n그룹 ${addedGroups}개 추가\n중복 ${skipped}명 건너뜀`);
    } catch(err) {
      alert('❌ 파일을 읽을 수 없습니다: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// 탭 닫을 때 자동 백업 (7일에 한 번)
window.addEventListener('beforeunload', function() {
  if(!members.length) return;
  const lastAuto = localStorage.getItem('elimAutoBackup_엘림교회');
  const now = Date.now();
  const sevenDays = 7 * 24 * 60 * 60 * 1000;
  if(lastAuto && (now - parseInt(lastAuto)) < sevenDays) return; // 7일 안 됐으면 스킵
  try {
    const data={members,groups,backupDate:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='ElimCell_자동백업_'+today()+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    localStorage.setItem('elimAutoBackup_엘림교회', String(now));
  } catch(e){}
});

}
function getFiltered() {
  const qq=(q||'').toLowerCase();
  const cSel=(selCat||'cell');
  const cCfg=catById(cSel);
  const pick=selCatPick[cSel];

  return (members||[]).filter(function(m){
    // 검색
    const okQ = (m.name||'').toLowerCase().includes(qq) || ((m.phone||'').includes(q||''));
    if(!okQ) return false;

    // 분류/그룹 필터
    if(cSel==='cell'){
      if(m.group===BEST_GROUP) return false;
      if(selGrp==='all') return true;
      return m.group===selGrp;
    }

    const cs=(m.catSel||{});
    const v=cs[cSel];

    // A정책: non-cell 분류에서 '미지정'은 숨김
    if(v===undefined || v===null || v==='all') return false;

    if(cCfg.selectMode==='multi'){
      if(!Array.isArray(v) || v.length===0) return false;
      // pick(칩 선택)이 없으면: 해당 분류 소속자는 전부 표시
      if(!Array.isArray(pick) || pick.length===0) return true;
      return v.some(x=>pick.includes(x));
    }

    // single
    if(!pick || pick==='all') return true;
    return v===pick;
  });
}

function icoSm(svg, size) {
  if(!svg) return '';
  size = size || 18;
  return svg.replace('viewBox="0 0 24 24"', 'viewBox="0 0 24 24" width="'+size+'" height="'+size+'" style="display:inline-block;vertical-align:-4px;flex-shrink:0"');
}
function icoBig(svg) {
  if(!svg) return '';
  return svg.replace('viewBox="0 0 24 24"', 'viewBox="0 0 24 24" width="52" height="52" style="display:block;margin:0 auto 12px"').replace(/ width="\d+" height="\d+"/, '');
}
function _stopEvt(e){
  try{
    if(!e) return;
    if(e.stopPropagation) e.stopPropagation();
    if(e.preventDefault) e.preventDefault();
  }catch(_){}
}

function hdrBtn(icon, label, onclick, title) {
  // WebView 호환: inline handler에서 event가 undefined일 수 있어 typeof로 안전 처리
  onclick = onclick || '';
  return '<button class="hdr-btn" type="button" style="touch-action:manipulation" '       + 'onclick="_stopEvt((typeof event!==\'undefined\')?event:(window.event||null));' + onclick + '" '       + 'title="' + (title||label) + '">' + icon + '</button>';

function setMemCellGroup(flag, g){
  const t = memObj(flag);
  t.group = g;
  if(!t.catSel) t.catSel={};
  t.catSel.cell = g;
  render();
}
function setMemCatSel(flag, catId, v){
  const t = memObj(flag);
  if(!t.catSel) t.catSel={};
  t.catSel[catId]=v;
  render();
}
function toggleMemCatSel(flag, catId, g){
  const t = memObj(flag);
  if(!t.catSel) t.catSel={};
  let a=t.catSel[catId];
  if(!Array.isArray(a)) a=[];
  a = a.includes(g) ? a.filter(x=>x!==g) : a.concat([g]);
  t.catSel[catId]=a;
  render();
}

function catSelFormHTML(mem, targetFlag){

    const cs = (mem && mem.catSel && typeof mem.catSel==='object') ? mem.catSel : {};

      if(c.id==='cell') return;

      if(c.selectMode==='single'){
        const v = (typeof cur==='string') ? cur : 'all';
        h += '<select onchange="setMemCatSel(\''+targetFlag+'\',\''+c.id+'\',this.value)" class="w-full p-3 border border-[#D9D3C8] rounded-xl text-base">';

// ═══════════════════════════════════
//  SWIPE TO ENTER
// ═══════════════════════════════════
(function(){
  const loading = document.getElementById('loading');
  const fill = document.getElementById('swipe-fill');
  if(!loading){ try{ safeRender(); }catch(e){} return; }
  let startY = null, startX = null;
  const THRESHOLD = 45; // px 위로 스와이프 (v7b: WebView 민감도 개선)

  function enter() {
    loading.style.transition = 'transform .45s cubic-bezier(.4,0,.2,1), opacity .45s';
    loading.style.transform = 'translateY(-100%)';
    loading.style.opacity = '0';
    setTimeout(()=>{
      try{ loading.style.display='none'; }catch(_){}
      try{ safeRender(); }catch(e){ try{ render && render(); }catch(_){} }
    }, 450);
  }

  loading.addEventListener('touchstart', e=>{
    startY = e.touches[0].clientY;
    startX = e.touches[0].clientX;
    if(fill) fill.style.transition = 'none';
  }, {passive:true});

  loading.addEventListener('touchmove', e=>{
    try{ if(e && e.preventDefault) e.preventDefault(); }catch(_){}
    if(startY===null) return;
    const dy = startY - e.touches[0].clientY;
    if(dy < 0) { if(fill) fill.style.width='0%'; return; }
    const pct = Math.min(dy / THRESHOLD * 100, 100);
    if(fill) fill.style.width = pct+'%';
    loading.style.transform = 'translateY(-'+Math.min(dy*0.4, 40)+'px)';
  }, {passive:false});

  loading.addEventListener('touchend', e=>{
    try{ if(e && e.preventDefault) e.preventDefault(); }catch(_){}
    if(startY===null) return;
    const dy = startY - e.changedTouches[0].clientY;
    startY = null;
    if(dy >= THRESHOLD) {
      enter();
    } else {
      loading.style.transition = 'transform .3s ease';
      loading.style.transform = 'translateY(0)';
      if(fill) { fill.style.transition = 'width .3s'; fill.style.width='0%'; }
    }
  }, {passive:false});

  loading.addEventListener('touchcancel', e=>{
    try{ if(e && e.preventDefault) e.preventDefault(); }catch(_){}
    if(startY===null) return;
    const dy = startY - (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientY : startY);
    startY = null;
    if(dy >= THRESHOLD) enter();
    else {
      loading.style.transition = 'transform .3s ease';
      loading.style.transform = 'translateY(0)';
      if(fill) { fill.style.transition = 'width .3s'; fill.style.width='0%'; }
    }
  }, {passive:false});

  

  // (v7b) Pointer Events fallback (일부 Android WebView에서 touchend 누락 케이스 대응)
  try {
    let pStartY = null;
    loading.addEventListener('pointerdown', e=>{ pStartY = e.clientY; }, {passive:true});
    loading.addEventListener('pointerup', e=>{
      if(pStartY===null) return;
      const dy = pStartY - e.clientY;
      pStartY = null;
      if(dy >= THRESHOLD) enter();
    }, {passive:true});
  } catch(e) {}

// 클릭/탭으로도 진입 가능
  loading.addEventListener('click', ()=>{ enter(); });
  try{ const b=document.getElementById('btnEnter'); if(b) b.addEventListener('click', (e)=>{ try{e.stopPropagation&&e.stopPropagation();}catch(_){} enter(); }); }catch(e){}

  // AUTO_ENTER_FAILSAFE: 로딩 화면에서 홈이 안 보이는 경우를 대비해 자동 진입
  setTimeout(()=>{
    try {
      if(loading && loading.style.display !== 'none') enter();
    } catch(e) {}
  }, 650);
})();

// ═══════════════════════════════════
//  SWIPE ← → 그룹/탭 전환
// ═══════════════════════════════════
(function(){
  let sx = 0, sy = 0;

  function anim(dir, fn) {
    fn();
    window.scrollTo({top: 0, behavior: 'instant'});
  }

  function switchGroup(dir) {
    const list = ['all', ...groups];
    let next = list.indexOf(selGrp) + dir;
    if(next < 0) next = list.length - 1;
    if(next >= list.length) next = 0;
    selGrp = list[next]; q = '';
    anim(dir, render);
  }

  function switchTab(dir) {
    const TABS = ['info','counseling','education','attendance','prayer'];
    let next = TABS.indexOf(tab) + dir;
    if(next < 0) next = TABS.length - 1;
    if(next >= TABS.length) next = 0;
    tab = TABS[next];
    anim(dir, render);
  }

  document.addEventListener('touchstart', e=>{
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, {passive:true});

  document.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dx) < 35 || Math.abs(dy) > Math.abs(dx)) return;
    if(document.querySelector('.modal')) return;
    const dir = dx < 0 ? 1 : -1;
    if(view === 'list') switchGroup(dir);
    else if(view === 'detail') switchTab(dir);
  }, {passive:true});
})();

  const _app2 = getApps().find(a=>a.name==='hub-data') || initializeApp(firebaseConfig,'hub-data');
  const _db2 = getFirestore(_app2);
  const ALL_CELLS=['여호와샬롬','예수사랑','여호와라파','한마음','밀알','감사','여호와이레','유초등부','중고등부','청년대학','새소식반'];
  onSnapshot(collection(_db2,'cells'),(snapshot)=>{
    snapshot.forEach((docSnap)=>{
      const data=docSnap.data(),cell=docSnap.id;
      if(data.members) localStorage.setItem('elim_엘림교회_'+cell+'_Members',JSON.stringify(data.members));
      if(data.groups)  localStorage.setItem('elim_엘림교회_'+cell+'_Groups', JSON.stringify(data.groups));
      if(data.schedules) localStorage.setItem('elim_엘림교회_'+cell+'_Schedules',JSON.stringify(data.schedules));
      if(data.meetings)  localStorage.setItem('elim_엘림교회_'+cell+'_Meetings', JSON.stringify(data.meetings));
    });
    const merged=[];
    ALL_CELLS.forEach(function(cell){
      const mems=JSON.parse(localStorage.getItem('elim_엘림교회_'+cell+'_Members')||'[]');
      mems.forEach(function(m){merged.push(Object.assign({},m,{_sourceCell:cell}));});
    });
    if(merged.length>0){members=merged;localStorage.setItem('elim_엘림교회_엘림교회_Members',JSON.stringify(members));}
    if(typeof render==='function') render();
  });
  window.syncToFirebase=async function(){
    const cellMap={};
    (window.members||[]).forEach(function(m){const cell=m._sourceCell;if(!cell)return;if(!cellMap[cell])cellMap[cell]=[];cellMap[cell].push(m);});
    for(const [cell,mems] of Object.entries(cellMap)){
      try{await setDoc(doc(_db2,'cells',cell),{members:mems,lastUpdated:new Date().toISOString()},{merge:true});}catch(e){}
    }
  };
  window.addEventListener('load',function(){const _o=window.save;window.save=function(){if(typeof _o==='function')_o();window.syncToFirebase();};});
</script>
